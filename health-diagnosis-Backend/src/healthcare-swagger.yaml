openapi: 3.0.4
info:
  title: Healthcare System API Specification
  description: API Documentation for Healthcare Disease Diagnosis & Appointment Booking System
  version: 1.0.0
servers:
  - url: https://health-diagnosis-0nx2.onrender.com
    description: Production Server on Render
  - url: http://localhost:3001
    description: Local Development Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: auth
    description: Authentication & Password Recovery
  - name: user
    description: User Profile Management
  - name: symptoms
    description: Symptom Checking & AI Disease Prediction
  - name: diseases
    description: Disease Knowledge Base & Search History
  - name: appointment
    description: Booking & Patient Treatments
  - name: admin
    description: Administrative Controls (Hospitals, Doctors, Medicines)
  - name: icd
    description: ICD-10 Medical Coding APIs
  - name: medicine
    description: Medicine Inventory & Search
  - name: news
    description: Medical News Feed
  - name: dashboard
    description: Epidemiological Statistics Dashboard

paths:
  # === AUTHENTICATION ===
  /api/auth/signup:
    post:
      tags: [auth]
      summary: Sign up a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, Username, First_name, Last_name]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                Username: { type: string }
                First_name: { type: string }
                Last_name: { type: string }
      responses:
        '200':
          description: Registered successfully

  /api/auth/login:
    post:
      tags: [auth]
      summary: Log in with username/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Username, password]
              properties:
                Username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Return JWT token

  /api/auth/google-login:
    post:
      tags: [auth]
      summary: Login via Google OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Return JWT token

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Log out current user
      responses:
        '200':
          description: Logged out successfully

  /api/auth/forgotpassword:
    post:
      tags: [auth]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP sent to email

  /api/auth/verifyOtp:
    post:
      tags: [auth]
      summary: Verify password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string, format: email }
                otp: { type: string }
      responses:
        '200':
          description: OTP verified successfully

  /api/auth/resetpassword:
    post:
      tags: [auth]
      summary: Set a new password after OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, newPassword]
              properties:
                email: { type: string, format: email }
                otp: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Password reset successfully

  # === USER PROFILE ===
  /api/user/getUser:
    get:
      tags: [user]
      summary: Retrieve current logged-in user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data returned

  /api/user/updateUser:
    patch:
      tags: [user]
      summary: Update user profile information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                First_name: { type: string }
                Last_name: { type: string }
                phone: { type: string }
      responses:
        '200':
          description: Profile updated successfully

  # === SYMPTOMS & AI PREDICTION ===
  /api/symptoms:
    get:
      tags: [symptoms]
      summary: Get all symptoms in database
      responses:
        '200':
          description: List of symptoms returned

  /api/symptoms/check:
    post:
      tags: [symptoms]
      summary: Predict diseases based on selected symptoms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symptoms]
              properties:
                symptoms:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: AI Prediction results returned

  /api/symptoms/history:
    get:
      tags: [symptoms]
      summary: Get user AI prediction history list
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Prediction history returned
    post:
      tags: [symptoms]
      summary: Save a prediction result to history
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [diseaseName, symptoms, accuracy]
              properties:
                diseaseName: { type: string }
                symptoms: { type: array, items: { type: string } }
                accuracy: { type: number }
      responses:
        '200':
          description: History saved

  # === DISEASES ===
  /api/diseases/suggestions:
    get:
      tags: [diseases]
      summary: Get autocomplete suggestions for disease names
      responses:
        '200':
          description: Suggestion list returned

  /api/diseases/search:
    post:
      tags: [diseases]
      summary: Search diseases database with query filters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        '200':
          description: Matching diseases list returned

  /api/diseases/detail/{id}:
    get:
      tags: [diseases]
      summary: Retrieve detailed info of a disease by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Disease object with precautions, treatments, etc.

  /api/diseases/symptom/{id}:
    get:
      tags: [diseases]
      summary: Retrieve symptom detailed information
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Symptom details returned

  /api/diseases/search/history:
    get:
      tags: [diseases]
      summary: Get user disease search history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: History list returned
    post:
      tags: [diseases]
      summary: Save a search query to user history
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        '200':
          description: Search history query saved

  # === APPOINTMENTS & DOCTORS ===
  /api/appointment/nearby-hospitals:
    get:
      tags: [appointment]
      summary: Get nearby hospitals within 10km radius with distance calculation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of nearby hospitals

  /api/appointment/hospitals/{hospitalId}/doctors:
    get:
      tags: [appointment]
      summary: Get doctors belonging to a hospital by department
      security:
        - bearerAuth: []
      parameters:
        - name: hospitalId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: List of doctors

  /api/appointment/book:
    post:
      tags: [appointment]
      summary: Create a medical booking appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hospital_id, doctor_id, date, time_slot]
              properties:
                hospital_id: { type: integer }
                doctor_id: { type: integer }
                date: { type: string, format: date }
                time_slot: { type: string }
                symptoms: { type: string }
      responses:
        '200':
          description: Booking registered successfully

  /api/appointment/my-appointments:
    get:
      tags: [appointment]
      summary: View booking appointments history of current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointments list returned

  /api/appointment/doctor-appointments:
    get:
      tags: [appointment]
      summary: View assigned appointments for logged-in doctor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doctor appointments list

  /api/appointment/{id}/status:
    put:
      tags: [appointment]
      summary: Update booking appointment status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [pending, confirmed, cancelled, completed] }
      responses:
        '200':
          description: Status updated

  /api/appointment/patient-health/{userId}:
    get:
      tags: [appointment]
      summary: View full health record and history of a patient (Doctor only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Patient profile and previous treatments returned

  /api/appointment/doctor/profile:
    get:
      tags: [appointment]
      summary: Get logged-in doctor profile details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doctor profile returned
    put:
      tags: [appointment]
      summary: Update doctor profile metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specialization: { type: string }
                experience_years: { type: integer }
                description: { type: string }
      responses:
        '200':
          description: Doctor profile updated

  /api/appointment/{id}/treatment:
    put:
      tags: [appointment]
      summary: Update diagnosis and prescription for an appointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [diagnosis]
              properties:
                diagnosis: { type: string }
                prescription: { type: string }
      responses:
        '200':
          description: Treatment saved

  # === ICD CODES ===
  /api/icd/search:
    get:
      tags: [icd]
      summary: Search ICD-10 codes by query string
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ICD results list

  /api/icd/detail/{icdId}:
    get:
      tags: [icd]
      summary: Get details of an ICD code
      security:
        - bearerAuth: []
      parameters:
        - name: icdId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ICD details returned

  /api/icd/enrich/{diseaseName}:
    get:
      tags: [icd]
      summary: Enrich a disease name with matching ICD-10 data
      security:
        - bearerAuth: []
      parameters:
        - name: diseaseName
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Enriched ICD object

  # === MEDICINES ===
  /api/medicine:
    get:
      tags: [medicine]
      summary: Search and list medicines in stock
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Medicine list returned
    post:
      tags: [medicine]
      summary: Add a new medicine type (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                stock: { type: integer }
      responses:
        '200':
          description: Medicine registered

  # === MEDICAL NEWS ===
  /api/news:
    get:
      tags: [news]
      summary: Get cached medical news feed articles
      responses:
        '200':
          description: News articles returned

  /api/news/refresh:
    post:
      tags: [news]
      summary: Force refresh news feed articles from NewsData API (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: News refreshed successfully

  # === EPIDEMIOLOGICAL DASHBOARD ===
  /api/dashboard/daily:
    get:
      tags: [dashboard]
      summary: Retrieve epidemiological daily chart analytics counts
      responses:
        '200':
          description: Statistical daily counts returned

  # === ADMIN CONTROLS ===
  /api/admin/all:
    get:
      tags: [admin]
      summary: Get all diseases list in system (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of diseases returned

  /api/admin/disease/{id}:
    get:
      tags: [admin]
      summary: Retrieve single disease info by ID for editing (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Disease details returned

  /api/admin/stats:
    get:
      tags: [admin]
      summary: Get system metrics stats overview (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stat counts (users, doctors, bookings, etc.)

  /api/admin/doctors:
    get:
      tags: [admin]
      summary: List all doctor accounts (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of doctors returned
    post:
      tags: [admin]
      summary: Create a new doctor user profile (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, Username, email, password]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                Username: { type: string }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Doctor user created

  /api/admin/doctors/{id}:
    put:
      tags: [admin]
      summary: Update a doctor user details (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
      responses:
        '200':
          description: Doctor updated
    delete:
      tags: [admin]
      summary: Delete/deactivate a doctor user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Doctor deleted

  /api/admin/hospitals:
    get:
      tags: [admin]
      summary: List all registered hospitals (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of hospitals returned
    post:
      tags: [admin]
      summary: Add a new hospital registry manually (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                phone: { type: string }
                image_url: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Hospital created

  /api/admin/hospitals/{id}:
    put:
      tags: [admin]
      summary: Update hospital registry metadata (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Hospital updated
    delete:
      tags: [admin]
      summary: Remove a hospital registry (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Hospital deleted

  /api/admin/hospitals/sync-overpass:
    post:
      tags: [admin]
      summary: Fetch and sync hospitals data from Overpass API (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Synced successfully

  /api/admin/medicines:
    get:
      tags: [admin]
      summary: List all medicines for warehouse tracking (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of medicines returned
    post:
      tags: [admin]
      summary: Create a new medicine entry (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                stock: { type: integer }
      responses:
        '200':
          description: Medicine entry created

  /api/admin/medicines/{id}:
    patch:
      tags: [admin]
      summary: Update stock quantity of a medicine (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stock]
              properties:
                stock: { type: integer }
      responses:
        '200':
          description: Medicine stock updated
    delete:
      tags: [admin]
      summary: Remove a medicine entry (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Medicine deleted

  /api/admin/appointments:
    get:
      tags: [admin]
      summary: List all booking appointments across the system (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all appointments returned

  /api/admin/diseases/sync-auto:
    post:
      tags: [admin]
      summary: Trigger automatic disease prediction AI synchronization (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: AI sync executed successfully
